services:
  - type: web
    name: e-lixo
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: E_LIXO_ADMIN_USER
        value: admin
      - key: E_LIXO_ADMIN_PASS
        value: password
